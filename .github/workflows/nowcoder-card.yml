name: update nowcoder card

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate NowCoder card
        run: python scripts/generate_nowcoder_card.py --profile-id 736728226 --output assets/nowcoder-card.svg

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/nowcoder-card.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update nowcoder card"
          git push
